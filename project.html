<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ebook Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#090909;
    --panel:#121212;
    --panel-2:#171717;
    --border:#2b2b2b;
    --text:#ffffff;
    --muted:#9b9b9b;
    --red:#b50f0f;
    --red-hover:#d41717;
    --silver:#c9c9c9;
    --success:#22c55e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
}

.app{
    max-width:1400px;
    margin:auto;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    padding-bottom:20px;
    border-bottom:1px solid var(--border);
}

.brand{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo{
    width:46px;
    height:46px;
    border-radius:12px;
    background:linear-gradient(145deg,#700909,#c51515);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    font-weight:700;
    box-shadow:0 0 25px rgba(181,15,15,.35);
}

.brand h1{
    font-size:24px;
    font-weight:700;
    letter-spacing:.5px;
}

.brand p{
    color:var(--muted);
    font-size:13px;
}

.status-badge{
    padding:10px 16px;
    background:#141414;
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--silver);
    font-size:13px;
}

.dashboard{
    display:grid;
    grid-template-columns:350px 1fr;
    gap:25px;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:24px;
    transition:.3s;
}

.card:hover{
    border-color:#4b4b4b;
}

.section-title{
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--silver);
    margin-bottom:18px;
}

.upload-zone{
    border:2px dashed #4a1a1a;
    background:var(--panel-2);
    border-radius:16px;
    padding:35px 20px;
    text-align:center;
    transition:.3s;
}

.upload-zone.drag{
    border-color:var(--red);
    background:#1c1010;
}

.upload-zone h3{
    margin-bottom:10px;
}

.upload-zone p{
    color:var(--muted);
    font-size:14px;
    margin-bottom:18px;
}

.btn{
    border:none;
    cursor:pointer;
    transition:.25s;
    font-weight:600;
}

.primary-btn{
    background:var(--red);
    color:white;
    padding:12px 18px;
    border-radius:10px;
}

.primary-btn:hover{
    background:var(--red-hover);
}

input[type=file]{
    display:none;
}

.stats{
    margin-top:20px;
    display:grid;
    gap:12px;
}

.stat-box{
    background:var(--panel-2);
    border:1px solid var(--border);
    padding:15px;
    border-radius:12px;
}

.stat-label{
    color:var(--muted);
    font-size:13px;
}

.stat-value{
    font-size:22px;
    margin-top:4px;
    font-weight:700;
}

.library-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.file-count{
    color:var(--muted);
}

.file-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.file-item{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    animation:fadeIn .3s ease;
}

.file-left{
    display:flex;
    align-items:center;
    gap:15px;
    min-width:0;
}

.icon{
    width:48px;
    height:48px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    background:#1f1f1f;
    border:1px solid #333;
}

.file-details{
    min-width:0;
}

.file-name{
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.meta{
    display:flex;
    gap:12px;
    margin-top:6px;
    flex-wrap:wrap;
}

.meta span{
    color:var(--muted);
    font-size:13px;
}

.status{
    color:var(--success);
}

.actions{
    display:flex;
    gap:10px;
}

.download-btn{
    background:#1d1d1d;
    border:1px solid #444;
    color:white;
    padding:10px 14px;
    border-radius:10px;
}

.download-btn:hover{
    border-color:#888;
}

.delete-btn{
    background:#250d0d;
    border:1px solid #5d1a1a;
    color:#ffb4b4;
    padding:10px 14px;
    border-radius:10px;
}

.delete-btn:hover{
    background:#411010;
}

.empty{
    text-align:center;
    color:var(--muted);
    padding:50px 0;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:950px){
    .dashboard{
        grid-template-columns:1fr;
    }
}

@media(max-width:650px){

    .topbar{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .file-item{
        flex-direction:column;
        align-items:flex-start;
    }

    .actions{
        width:100%;
    }

    .actions button{
        flex:1;
    }
}
</style>
</head>
<body>

<div class="app">

    <div class="topbar">
        <div class="brand">
            <div class="logo">📚</div>
            <div>
                <h1>Ebook Library</h1>
                <p>Enterprise File Management System</p>
            </div>
        </div>

        <div class="status-badge">
            ● Secure Storage Active
        </div>
    </div>

    <div class="dashboard">

        <div class="card">

            <div class="section-title">
                Upload Center
            </div>

            <div class="upload-zone" id="dropZone">
                <h3>Upload Ebook Files</h3>
                <p>Select files or drag them into the secure upload area.</p>

                <label for="fileInput">
                    <span class="btn primary-btn">
                        Select Files
                    </span>
                </label>

                <input type="file" id="fileInput" multiple>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Total Files</div>
                    <div class="stat-value" id="totalFiles">0</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Storage Used</div>
                    <div class="stat-value" id="totalSize">0 KB</div>
                </div>
            </div>

        </div>

        <div class="card">

            <div class="library-header">
                <div class="section-title">
                    Library Repository
                </div>

                <div class="file-count" id="fileCountText">
                    0 Files
                </div>
            </div>

            <div class="file-list" id="fileList">

                <div class="empty">
                    No ebooks uploaded yet.
                </div>

            </div>

        </div>

    </div>

</div>

<script>

const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const totalFiles = document.getElementById('totalFiles');
const totalSize = document.getElementById('totalSize');
const fileCountText = document.getElementById('fileCountText');
const dropZone = document.getElementById('dropZone');

let filesData = [];

function formatSize(bytes){
    if(bytes < 1024) return bytes + ' B';
    if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(2) + ' MB';
}

function getIcon(type,name){

    if(type.includes('pdf')) return '📕';
    if(type.includes('image')) return '🖼️';
    if(type.includes('word')) return '📄';
    if(name.endsWith('.epub')) return '📘';
    return '📁';
}

function updateStats(){

    totalFiles.textContent = filesData.length;

    const total = filesData.reduce(
        (sum,file)=>sum+file.size,0
    );

    totalSize.textContent = formatSize(total);
    fileCountText.textContent = filesData.length + ' Files';
}

function renderFiles(){

    if(filesData.length===0){
        fileList.innerHTML=
        `<div class="empty">
            No ebooks uploaded yet.
        </div>`;
        updateStats();
        return;
    }

    fileList.innerHTML='';

    filesData.forEach((file,index)=>{

        const item=document.createElement('div');
        item.className='file-item';

        item.innerHTML=`
        <div class="file-left">

            <div class="icon">
                ${getIcon(file.type,file.name)}
            </div>

            <div class="file-details">

                <div class="file-name">
                    ${file.name}
                </div>

                <div class="meta">
                    <span>${formatSize(file.size)}</span>
                    <span class="status">● Ready</span>
                </div>

            </div>

        </div>

        <div class="actions">
            <button class="btn download-btn">
                Download
            </button>

            <button class="btn delete-btn">
                Delete
            </button>
        </div>
        `;

        const downloadBtn=item.querySelector('.download-btn');
        const deleteBtn=item.querySelector('.delete-btn');

        downloadBtn.addEventListener('click',()=>{

            const url=URL.createObjectURL(file);

            const a=document.createElement('a');
            a.href=url;
            a.download=file.name;
            a.click();

            URL.revokeObjectURL(url);
        });

        deleteBtn.addEventListener('click',()=>{

            filesData.splice(index,1);
            renderFiles();
        });

        fileList.appendChild(item);
    });

    updateStats();
}

function addFiles(files){

    filesData.push(...files);
    renderFiles();
}

fileInput.addEventListener('change',(e)=>{
    addFiles([...e.target.files]);
});

dropZone.addEventListener('dragover',(e)=>{
    e.preventDefault();
    dropZone.classList.add('drag');
});

dropZone.addEventListener('dragleave',()=>{
    dropZone.classList.remove('drag');
});

dropZone.addEventListener('drop',(e)=>{

    e.preventDefault();
    dropZone.classList.remove('drag');

    addFiles([...e.dataTransfer.files]);
});

</script>

</body>
</html>
